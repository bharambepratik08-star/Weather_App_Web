<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <aside>
        <div class="btn-aside">
            <button class="weather-logo">
                <h1>Weather.</h1>
            </button>
            <button class="overview aside-btn">
                <i class="fa-solid fa-house"></i>
                <h3>Overview</h3>
            </button>
            <button class="forecast aside-btn">
                <i class="fa-regular fa-calendar"></i>
                <h3>Forecast</h3>
            </button>
            <button class="map aside-btn">
                <i class="fa-solid fa-book-open"></i>
                <h3>Map</h3>
            </button>
            <button class="alerts aside-btn">
                <i class="fa-solid fa-bell"></i>
                <h3>Alerts</h3>
            </button>
            <button class="air-quality aside-btn">
                <i class="fa-solid fa-location-crosshairs"></i>
                <h3>Air Quality</h3>
            </button>
            <button class="setting aside-btn">
                <i class="fa-solid fa-gear"></i>
                <h3>Setting</h3>
            </button>
        </div>
    </aside>
    <div class="content">
        <header>
            <div class="nav_bar">
                <div class="search-bar">
                    <button class="search-st btn-header">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                    <input type="text" name="" id="input_text_city" placeholder="Search for a city">
                </div>
                <div class="notification_profile">
                    <button class="notification btn-header btn-no-po">
                        <i class="fa-solid fa-bell"></i>
                    </button>
                    <button class="profile btn-header btn-no-po">
                        <i class="fa-regular fa-user"></i>
                    </button>
                </div>
            </div>
        </header>
        <main>

        </main>
    </div>
</body>
</html>
