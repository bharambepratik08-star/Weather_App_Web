<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <aside>
        <div class="btn-aside">
            <button class="weather-logo">
                <h1>Weather.</h1>
            </button>
            <button class="overview aside-btn">
                <i class="fa-solid fa-house"></i>
                <h3>Overview</h3>
            </button>
            <button class="forecast-btn aside-btn">
                <i class="fa-regular fa-calendar"></i>
                <h3>Forecast</h3>
            </button>
            <button class="map aside-btn">
                <i class="fa-solid fa-book-open"></i>
                <h3>Map</h3>
            </button>
            <button class="alerts aside-btn">
                <i class="fa-solid fa-bell"></i>
                <h3>Alerts</h3>
            </button>
            <button class="air-quality aside-btn">
                <i class="fa-solid fa-location-crosshairs"></i>
                <h3>Air Quality</h3>
            </button>
            <button class="setting aside-btn">
                <i class="fa-solid fa-gear"></i>
                <h3>Setting</h3>
            </button>
        </div>
        <div class="local-city">
            <div class="city-name">
                <i class="fa-solid fa-location-dot"></i>
                <p class="city-value"></p>
            </div>
            <div class="auto-loca">
                <p class="auto-loca">Auto locate</p>
                <i class="fa-solid fa-location-crosshairs"></i>
            </div>
        </div>
    </aside>
    <div class="content">
        <header>
            <button class="menu-btn">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="nav_bar">
                <div class="search-bar">
                    <button class="search-st btn-header">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                    <input type="text" name="" id="input_text_city" placeholder="Search for a city">
                </div>
                <div class="notification_profile">
                    <button class="notification btn-header btn-no-po">
                        <i class="fa-solid fa-bell"></i>
                    </button>
                    <button class="profile btn-header btn-no-po">
                        <i class="fa-regular fa-user"></i>
                    </button>
                </div>
            </div>
        </header>
        <main>
            <div class="city-plus-type">
                <div class="weather-current-city">
                    <img class="logo-up" src="">
                    <div class="js-auto-info">
                        <h1 class="temp city-value"></h1>
                        <h1 class="temp temp-value"></h1>
                        <h2 class="temp mode-value"></h2>
                    </div>
                </div>
                <div class="define-current-city">
                    <div class="humidity define-box">
                        <div class="logoo">
                            <i class="fa-solid fa-droplet"></i>
                        </div>
                        <div class="text-humiity text-box">
                            <p>Humidity</p>
                            <p class="humidity-js">
                                
                            </p>
                        </div>
                    </div>
                    <div class="wind define-box">
                        <div class="logoo">
                            <i class="fa-solid fa-wind"></i>
                        </div>
                        <div class="text-wind text-box">
                            <p>Wind</p>
                            <p class="wind-js">

                            </p>
                        </div>
                    </div>
                    <div class="pressure define-box">
                        <div class="logoo">
                            <i class="fa-solid fa-gauge"></i>
                        </div>
                        <div class="text-pressure text-box">
                            <p>Pressure</p>
                            <p class="pressure-js">

                            </p>
                        </div>
                    </div>
                    <div class="ux-index define-box">
                        <div class="logoo">
                            <i class="fa-solid fa-sun"></i>
                        </div>
                        <div class="text-ux-index text-box">
                            <p>UX Index</p>
                            <p class="uxindex-js">

                            </p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="forecast-text">
                    <h2>5-day Forecast</h2>
                </div>
            <div class="forecast">
                <div class="forecast-today forecast-box">
                </div>
                <div class="forecast-tmr forecast-box">
                </div>
                <div class="forecast-three forecast-box">
                </div>
                <div class="forecast-four forecast-box">
                </div>
                <div class="forecast-five forecast-box">
                </div>
            </div>
            <div class="timing-sunriset">
                <div class="sunrise common-downbar detail-down">
                    <h3>Sunrise</h3>
                    <p class="sunrise-time">

                    </p>
                </div>
                <div class="sunset common-downbar detail-down">
                    <h3>Sunset</h3>
                    <p class="sunset-time">
                        
                    </p>
                </div>
                <div class="visibilty common-downbar detail-down">
                    <h3>Visibility</h3>
                    <p id="visibility-range">
                        
                    </p>
                </div>
                <div class="dew-point common-downbar detail-down">
                    <h3>Dew Point</h3>
                    <p class="dew-point-time">
                        
                    </p>
                </div>
                <div class="cloud-cover detail-down">
                    <h3>Cloud Cover</h3>
                    <p class="cloud-time">
                        
                    </p>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js" defer></script>
</body>
</html>
