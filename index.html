<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="content">
        <header>
            <button class="menu-btn">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="nav_bar">
                <div class="search-bar">
                    <button class="search-st btn-header">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                    <input type="text" name="" id="input_text_city" placeholder="Search for a city">
                </div>
                <div class="notification_profile">
                    <button class="notification btn-header btn-no-po">
                        <i class="fa-solid fa-bell"></i>
                    </button>
                    <button class="profile btn-header btn-no-po">
                        <i class="fa-regular fa-user"></i>
                    </button>
                </div>
            </div>
        </header>
        <main class="overview">
            <div class="city-plus-type">
                <div class="weather-current-city">
                    <img class="logo-up" src="">
                    <div class="js-auto-info">
                        <h1 class="temp city-value"></h1>
                        <h1 class="temp temp-value"></h1>
                        <h2 class="temp mode-value"></h2>
                    </div>
                </div>
                <div class="define-city-cont">
                    <h2>Todays' Details</h2>
                    <div class="define-current-city">
                        <div class="humidity define-box">
                            <div class="logoo">
                                <i class="fa-solid fa-droplet"></i>
                            </div>
                            <div class="text-humiity text-box">
                                <p>Humidity</p>
                                <p class="humidity-js">
                                    
                                </p>
                            </div>
                        </div>
                        <div class="wind define-box">
                            <div class="logoo">
                                <i class="fa-solid fa-wind"></i>
                            </div>
                            <div class="text-wind text-box">
                                <p>Wind</p>
                                <p class="wind-js">

                                </p>
                            </div>
                        </div>
                        <div class="pressure define-box">
                            <div class="logoo">
                                <i class="fa-solid fa-gauge"></i>
                            </div>
                            <div class="text-pressure text-box">
                                <p>Pressure</p>
                                <p class="pressure-js">

                                </p>
                            </div>
                        </div>
                        <div class="ux-index define-box">
                            <div class="logoo">
                                <i class="fa-solid fa-sun"></i>
                            </div>
                            <div class="text-ux-index text-box">
                                <p>UX Index</p>
                                <p class="uxindex-js">

                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="hourly-forecast">
                <div class="hourly-tet">
                    <h2>Hourly Text</h2>
                    <div class="arrow_scroll">
                        <div class="lefta  arrow">
                            <i class="fa-solid fa-arrow-left" style="color: hsl(0, 0%, 0%);"></i>
                        </div>
                        <div class="righta arrow">
                          <i class="fa-solid fa-arrow-right" style="color: hsl(0, 0%, 0%);"></i>
                        </div>
                    </div>
                </div>
                <div class="hourly-cont">

                </div>
            </div>
            <div class="timing-cont">
                <div class="timing-text">
                    <h2>Today's Highlights</h2>
                </div>
                <div class="timing-sunriset">
                    <div class="sunrise detail-down">
                        <h3><img src="svg/sunriset.svg" alt="sun" height="25px" width="25px">Sunrise</h3>
                        <p class="sunrise-time">

                        </p>
                    </div>
                    <div class="sunset detail-down">
                        <h3><img src="svg/sunriset.svg" alt="sun" height="25px" width="25px">Sunset</h3>
                        <p class="sunset-time">
                            
                        </p>
                    </div>
                    <div class="visibilty detail-down">
                        <h3><img src="svg/eye.svg" alt="sun" height="25px" width="25px">Visibility</h3>
                        <p id="visibility-range">
                            
                        </p>
                    </div>
                    <div class="dew-point detail-down">
                        <h3><img src="svg/drop.svg" alt="sun" height="20px" width="20px">Dew Point</h3>
                        <p class="dew-point-time">
                            
                        </p>
                    </div>
                    <div class="cloud-cover detail-down">
                        <h3><img src="svg/cloud-cover.svg" alt="sun" width="25px">Cloud Cover</h3>
                        <p class="cloud-time">
                            
                        </p>
                    </div>
                    <div class="wind-gust-index-cover detail-down">
                        <h3><img src="svg/gust.svg" alt="sun" height="25px" width="25px">Wind Gust</h3>
                        <p class="gust-time">
                            
                        </p>
                    </div>
                    <div class="rain-prob-cover detail-down">
                        <h3><img src="svg/umbrella.svg" alt="sun" height="25px" width="25px">Rain Chances</h3>
                        <p class="prob-time">
                            
                        </p>
                    </div>
                    <div class="sunshine-dur-cover detail-down">
                        <h3><img src="svg/dura.svg" alt="sun" height="25px" width="25px">Sunshine Hours</h3>
                        <p class="dura-time">
                            
                        </p>
                    </div>
                </div>
            </div>
        </main>
        <main class="forecast-main-page">
            <div class="forecast-main-div">
                <h2>7-day Forecast</h2>
                <div class="forecast-main">
                    <button class="forecast-today-m forecast-box-m active" data-chart="one">
                    </button>
                    <button class="forecast-tmr-m forecast-box-m" data-chart="two">
                    </button>
                    <button class="forecast-three-m forecast-box-m" data-chart="three">
                    </button>
                    <button class="forecast-four-m forecast-box-m" data-chart="four">
                    </button>
                    <button class="forecast-five-m forecast-box-m" data-chart="five">
                    </button>
                    <button class="forecast-six-m forecast-box-m" data-chart="six">
                    </button>
                    <button class="forecast-seven-m forecast-box-m" data-chart="seven">
                    </button>
                </div>
            </div>
            <div class="selected-day-forecast">
                <h2 class="print-js"></h2>
                <div class="cont-forecat weather-details">
                    <div class="selected-day-forecast-one">
                        <img src="" alt="" class="image-weather-mood">
                        <div class="mood-text-diff">
                            <p class="temp-high"></p>
                            <p class="temp-mood"></p>
                        </div>
                    </div>
                    <div class="selected-day-forecast-two">
                        <div class="common-forecast-detail ">
                            <img src="svg/feelslike.svg" alt="" height="40px" width="40px">
                            <div class="info">
                                <p>Feels like</p>
                                <h2 class="feels-like"></h2>
                            </div>
                        </div>
                        <div class="common-forecast-detail">
                            <img src="svg/umbrella.svg" alt="" height="40px" width="40px">
                            <div class="info">
                                <p>Rain Chance</p>
                                <h2 class="rain-chances"></h2>
                            </div>
                        </div>
                        <div class="common-forecast-detail">
                            <img src="svg/gust.svg" alt="" height="40px" width="40px">
                            <div class="info">
                                <p>Wind</p>
                                <h2 class="wind-speed"></h2>
                            </div>
                        </div>
                        <div class="common-forecast-detail">
                            <img src="svg/drop.svg" alt="" height="40px" width="40px">
                            <div class="info">
                                <p>Humidity</p>
                                <h2 class="humidity-fore"></h2>
                            </div>
                        </div>
                        <div class="common-forecast-detail">
                            <img src="svg/sunriset.svg" alt="" height="40px" width="40px">
                            <div class="info">
                                <p>Sunrise</p>
                                <h2 class="sunrise-js"></h2>
                            </div>
                        </div>
                        <div class="common-forecast-detail">
                            <img src="svg/sunriset.svg" alt="" height="40px" width="40px">
                            <div class="info">
                                <p>Sunset</p>
                                <h2 class="sunset-js"></h2>
                            </div>
                        </div>
                        <div class="common-forecast-detail">
                            <img src="svg/sun.svg" alt="" height="40px" width="40px">
                            <div class="info">
                                <p>Uv Index</p>
                                <h2 class="uvindex-js"></h2>
                            </div>
                        </div>
                        <div class="common-forecast-detail">
                            <img src="svg/pressure.svg" alt="" height="40px" width="40px">
                            <div class="info">
                                <p>Pressure</p>
                                <h2 class="pressures"></h2>
                            </div>
                        </div>  
                    </div>        
                </div>
            </div>
            <div class="charts-temp-more">
                <div class="button-chart">
                    <button class="tempBtn chartBtn active" data-chart="temperature">Temperature</button>
                    <button class="rainBtn chartBtn" data-chart="rain">Rain</button>
                    <button class="windBtn chartBtn" data-chart="wind">Wind</button>
                    <button class="humidityBtn chartBtn" data-chart="humidity">Humidity</button>
                    <button class="pressureBtn chartBtn" data-chart="pressure">Pressure</button>
                </div>
                <div class="weather-chart">
                    <canvas id="charts-cal"></canvas>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="script.js" defer></script>
</body>
</html>
